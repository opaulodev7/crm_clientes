{% extends 'base.html' %}

{% block content %}

<div class="page-header">
    <h2>Clientes</h2>

    <button
        class="btn btn-primary"
        data-bs-toggle="modal"
        data-bs-target="#modalCliente"
    >
        Novo Cliente
    </button>
</div>

<form method="GET" class="search-box">
    <input
        type="text"
        name="busca"
        class="form-control"
        placeholder="Buscar cliente..."
    >

    <button class="btn btn-dark">
        Buscar
    </button>
</form>

<div class="table-card">

    <div class="table-responsive">

        <table class="table table-hover align-middle">

            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nome</th>
                    <th>Telefone</th>
                    <th>Email</th>
                    <th>Cidade</th>
                    <th class="text-center">Ações</th>
                </tr>
            </thead>

            <tbody>

                {% for cliente in clientes %}
                <tr>

                    <td>{{ cliente.id }}</td>
                    <td>{{ cliente.nome }}</td>
                    <td>{{ cliente.telefone }}</td>
                    <td>{{ cliente.email }}</td>
                    <td>{{ cliente.cidade }}</td>

                    <td class="text-center">

                        <button
                            type="button"
                            class="btn btn-warning btn-sm btn-editar-cliente"

                            data-id="{{ cliente.id }}"
                            data-nome="{{ cliente.nome }}"
                            data-telefone="{{ cliente.telefone }}"
                            data-email="{{ cliente.email }}"
                            data-cidade="{{ cliente.cidade }}"
                        >
                            Editar
                        </button>

                        <a
                            href="{{ url_for('excluir_cliente', id=cliente.id) }}"
                            class="btn btn-danger btn-sm btn-delete"
                        >
                            Excluir
                        </a>

                    </td>

                </tr>
                {% endfor %}

            </tbody>

        </table>

    </div>

</div>


<!-- MODAL CADASTRO -->
<div
    class="modal fade"
    id="modalCliente"
    tabindex="-1"
>

    <div class="modal-dialog modal-dialog-centered">

        <div class="modal-content">

            <div class="modal-header">
                <h5 class="modal-title">
                    Novo Cliente
                </h5>

                <button
                    type="button"
                    class="btn-close"
                    data-bs-dismiss="modal"
                ></button>
            </div>

            <form
                action="{{ url_for('adicionar_cliente') }}"
                method="POST"
            >

                <div class="modal-body">

                    <div class="mb-3">
                        <label>Nome</label>

                        <input
                            type="text"
                            name="nome"
                            class="form-control"
                            required
                        >
                    </div>

                    <div class="mb-3">
                        <label>Telefone</label>

                        <input
                            type="text"
                            name="telefone"
                            class="form-control"
                            required
                        >
                    </div>

                    <div class="mb-3">
                        <label>Email</label>

                        <input
                            type="email"
                            name="email"
                            class="form-control"
                            required
                        >
                    </div>

                    <div class="mb-3">
                        <label>Cidade</label>

                        <input
                            type="text"
                            name="cidade"
                            class="form-control"
                            required
                        >
                    </div>

                </div>

                <div class="modal-footer">
                    <button class="btn btn-primary">
                        Salvar Cliente
                    </button>
                </div>

            </form>

        </div>

    </div>

</div>


<!-- MODAL EDITAR -->
<div
    class="modal fade"
    id="modalEditarCliente"
    tabindex="-1"
>

    <div class="modal-dialog modal-dialog-centered">

        <div class="modal-content">

            <div class="modal-header">
                <h5 class="modal-title">
                    Editar Cliente
                </h5>

                <button
                    type="button"
                    class="btn-close"
                    data-bs-dismiss="modal"
                ></button>
            </div>

            <form
                id="formEditarCliente"
                method="POST"
            >

                <div class="modal-body">

                    <input
                        type="hidden"
                        id="editClienteId"
                        name="id"
                    >

                    <div class="mb-3">
                        <label>Nome</label>

                        <input
                            type="text"
                            id="editNome"
                            name="nome"
                            class="form-control"
                            required
                            autocomplete="off"
                        >
                    </div>

                    <div class="mb-3">
                        <label>Telefone</label>

                        <input
                            type="text"
                            id="editTelefone"
                            name="telefone"
                            class="form-control"
                            required
                            autocomplete="off"
                        >
                    </div>

                    <div class="mb-3">
                        <label>Email</label>

                        <input
                            type="email"
                            id="editEmail"
                            name="email"
                            class="form-control"
                            required
                            autocomplete="off"
                        >
                    </div>

                    <div class="mb-3">
                        <label>Cidade</label>

                        <input
                            type="text"
                            id="editCidade"
                            name="cidade"
                            class="form-control"
                            required
                            autocomplete="off"
                        >
                    </div>

                </div>

                <div class="modal-footer">

                    <button
                        type="button"
                        class="btn btn-secondary"
                        data-bs-dismiss="modal"
                    >
                        Cancelar
                    </button>

                    <button type="submit" class="btn btn-success">
                        Atualizar Cliente
                    </button>

                </div>

            </form>

        </div>

    </div>

</div>

{% endblock %}
